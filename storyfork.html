                <div className="absolute bottom-0 left-0 right-0 p-4">
                  <span className="text-xs px-2 py-0.5 rounded-full bg-orange-500/20 text-orange-300 border border-orange-500/30 mb-2 inline-flex items-center gap-1"><Flame size={10}/>Trending</span>
                  <h2 className="font-bold text-lg text-white leading-tight">{featured.title}</h2>

          <div className="sm:hidden px-4 pb-3">

          <div className="flex items-center gap-2 px-4 mb-3">

    function StoryCard({ story, onClick, liked, onLike }) {

    // ─── DISCOVER PAGE ────────────────────────────────────────────────────────

      const results=query.trim()?stories.filter(s=>s.title.toLowerCase().includes(query.toLowerCase())||s.author.toLowerCase().includes(query.toLowerCase())||s.tags.some(t=>t.toLowerCase().includes(query.toLowerCase()))||s.genre.toLowerCase().includes(query.toLowerCase())||s.characters?.some(c=>c.name.toLowerCase().includes(query.toLowerCase()))):[];

      return (
        <div className="pb-24 sm:pb-6">
          <div className="px-4 pt-4 pb-3">

              <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none"/>
              <input type="text" placeholder="Search stories, authors, tags, characters…" value={query} onChange={e=>setQuery(e.target.value)}

              {query&&<button onClick={()=>setQuery("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500"><X size={13}/></button>}
            </div>
          </div>
          {!query.trim()&&(
            <>
              <div className="px-4 mb-5">
                <p className="text-xs text-zinc-500 uppercase tracking-wider mb-3 flex items-center gap-1.5"><Hash size={11}/>Trending Tags</p>
                <div className="flex flex-wrap gap-2">
                  {TAGS.map(t=><button key={t} onClick={()=>setQuery(t.slice(1))} className="px-3 py-1.5 bg-zinc-800 border border-zinc-700 rounded-full text-sm text-zinc-300">{t}</button>)}
                </div>
              </div>
              <div className="px-4">
                <p className="text-xs text-zinc-500 uppercase tracking-wider mb-3 flex items-center gap-1.5"><Sparkles size={11}/>Featured</p>
                <div className="space-y-2">
                  {featured.map((s,i)=>(
                    <button key={s.id} onClick={()=>onStoryClick(s)} className="w-full flex items-center gap-3 p-3 bg-zinc-900 border border-zinc-800 rounded-2xl text-left active:bg-zinc-800 transition">
                      <span className="text-xl font-black text-zinc-700 w-5 text-center flex-shrink-0">{i+1}</span>
                      <CoverGrad grad={s.grad} size="sm"/>
                      <div className="flex-1 min-w-0">
                        <p className="font-semibold text-sm text-white truncate">{s.title}</p>
                        <p className="text-zinc-500 text-xs">by {s.author} · {s.genre}</p>
                      </div>
                      <p className="text-xs text-pink-400 flex items-center gap-1 flex-shrink-0"><Heart size={10}/>{fmtNum(s.likes)}</p>
                    </button>
                  ))}
                </div>
              </div>
            </>
          )}
          {query.trim()&&(
            <div className="px-4">
              <p className="text-zinc-500 text-xs mb-3">{results.length} result{results.length!==1?"s":""} for "{query}"</p>
              {results.length===0
                ?<div className="text-center py-16"><Search size={32} className="mx-auto mb-3 text-zinc-700"/><p className="text-zinc-500 text-sm">Nothing found.</p></div>
                :<div className="space-y-2">{results.map(s=>{
                    const mc=s.characters?.find(c=>c.name.toLowerCase().includes(query.toLowerCase()));
                    return(
                      <button key={s.id} onClick={()=>onStoryClick(s)} className="w-full flex items-center gap-3 p-3 bg-zinc-900 border border-zinc-800 rounded-2xl text-left active:bg-zinc-800 transition">
                        <CoverGrad grad={s.grad} size="sm"/>
                        <div className="flex-1 min-w-0">
                          <p className="font-semibold text-sm text-white truncate">{s.title}</p>
                          <p className="text-zinc-500 text-xs">by {s.author} · {s.genre}</p>
                          {mc&&<p className="text-pink-400 text-xs mt-0.5">Character: {mc.name}</p>}
                        </div>
                        <ChevronRight size={14} className="text-zinc-700 flex-shrink-0"/>
                      </button>
                    );
                  })}</div>
              }
            </div>
          )}
        </div>
      );
    }

    // ─── STORY PAGE ───────────────────────────────────────────────────────────

    function StoryPage({ story, onBack, onChapterClick, fanvers, cosplays, onCosplayNav, onCharacterCosplay, onAuthorClick }) {
      const totalFanvers=story.chapters.reduce((a,ch)=>a+(fanvers[ch.id]?.length||0),0);
      const storyCosplays=cosplays.filter(c=>c.storyId===story.id);
      return (
        <div className="pb-24 sm:pb-6">
          <div className="sticky top-0 z-30">
            <TopBar onBack={onBack} title={story.title}
              right={storyCosplays.length>0&&<button onClick={onCosplayNav} className="flex items-center gap-1 text-xs text-pink-400 px-2 py-1 bg-pink-950/40 rounded-full border border-pink-900"><Camera size={11}/>{storyCosplays.length}</button>}
            />
          </div>
          <div className="px-4">
            <div className="flex gap-4 py-4">
              <CoverGrad grad={story.grad} size="cover"/>
              <div className="flex-1 min-w-0">
                <span className="text-xs px-2 py-0.5 rounded-full bg-purple-950 text-purple-300">{story.genre}</span>
                <h1 className="text-lg font-bold mt-1.5 mb-0.5 leading-tight">{story.title}</h1>
                <p className="text-zinc-400 text-sm mb-2">by <button onClick={onAuthorClick} className="text-purple-300 hover:text-purple-200 transition underline underline-offset-2">{story.author}</button></p>
                <div className="flex items-center gap-3 text-xs text-zinc-400 flex-wrap">
                  <span className="flex items-center gap-1"><Heart size={12} className="text-pink-400"/>{fmtNum(story.likes)}</span>
                  <span className="flex items-center gap-1"><BookOpen size={12}/>{story.chapterCount} ch</span>
                  <span className="flex items-center gap-1"><GitBranch size={12} className="text-purple-400"/>{totalFanvers}</span>
                </div>
              </div>
            </div>
            <p className="text-zinc-300 text-sm leading-relaxed mb-4">{story.description}</p>
            <div className="flex flex-wrap gap-1.5 mb-5">{story.tags.map(t=><Tag key={t} label={`#${t}`}/>)}</div>
            {story.characters?.length>0&&(
              <div className="mb-5">
                <p className="text-xs text-zinc-500 uppercase tracking-wider mb-3 flex items-center gap-1.5"><Users size={11} className="text-pink-400"/>Characters</p>
                <div className="flex gap-3 overflow-x-auto pb-1" style={{scrollbarWidth:"none"}}>
                  {story.characters.map(char=>{
                    const cc=cosplays.filter(c=>c.storyId===story.id&&c.characterId===char.id);
                    return(
                      <button key={char.id} onClick={()=>onCharacterCosplay(char,story)} className="flex-shrink-0 w-28 p-3 bg-zinc-900 border border-zinc-800 active:border-pink-800 rounded-2xl text-left transition">
                        <div className="w-9 h-9 rounded-full bg-gradient-to-br from-pink-900 to-rose-950 flex items-center justify-center mb-2"><User size={16} className="text-pink-300"/></div>
                        <p className="font-semibold text-xs text-white leading-tight">{char.name}</p>

            <div className="space-y-2">
              {story.chapters.map(ch=>{
                const fvCount=fanvers[ch.id]?.length||0;
                return(
                  <button key={ch.id} onClick={()=>onChapterClick(ch)} className="w-full flex items-center justify-between p-4 bg-zinc-900 active:bg-zinc-800 rounded-2xl border border-zinc-800 transition text-left">
                    <div>
                      <span className="text-zinc-600 text-xs">Ch. {ch.num}</span>
                      <p className="font-medium text-sm text-white">{ch.title}</p>
                    </div>
                    <div className="flex items-center gap-2 text-xs text-zinc-500">
                      {fvCount>0&&<span className="flex items-center gap-1 text-purple-400"><GitBranch size={11}/>{fvCount}</span>}
                      <ChevronRight size={16} className="text-zinc-700"/>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );

    // ─── CHAPTER READER ───────────────────────────────────────────────────────

    function ChapterReader({ story, chapter, onBack, fanvers, comments, setComments, newComment, setNewComment, currentUser, onWriteFanver, onViewFanver, liked, onLike, onChapterNav, onAuthorClick }) {
      const [commentLikes,setCommentLikes]=useState({});
      const [progress,setProgress]=useState(0);
      const contentRef=useRef(null);
      const rootFanvers=fanvers.filter(fv=>!fv.parentFanver);
      const chapterIndex=story.chapters.findIndex(ch=>ch.id===chapter.id);
      const prevChapter=chapterIndex>0?story.chapters[chapterIndex-1]:null;
      const nextChapter=chapterIndex<story.chapters.length-1?story.chapters[chapterIndex+1]:null;

      useEffect(()=>{
        const fn=()=>{
          const el=contentRef.current; if(!el) return;
          const rect=el.getBoundingClientRect();
          const total=el.offsetHeight-window.innerHeight;
          if(total<=0){setProgress(100);return;}
          setProgress(Math.min(100,Math.round((Math.max(0,-rect.top)/total)*100)));
        };
        window.addEventListener("scroll",fn,{passive:true}); fn();
        return()=>window.removeEventListener("scroll",fn);
      },[chapter.id]);

      const submitComment=()=>{
        if(!newComment.trim()) return;
        setComments(prev=>({...prev,[chapter.id]:[{id:`cm_${Date.now()}`,user:currentUser?.username||"guest_reader",text:newComment,likes:0,time:"just now"},...(prev[chapter.id]||[])]}));
        setNewComment("");
      };

      return(
        <div ref={contentRef} className="pb-24 sm:pb-8">
          <div className="fixed top-0 left-0 right-0 z-50 h-0.5 bg-zinc-800">
            <div className="h-full bg-purple-500 transition-all duration-100" style={{width:`${progress}%`}}/>
          </div>
          <div className="sticky top-0 z-30">
            <TopBar onBack={onBack} title={`Ch.${chapter.num} · ${chapter.title}`}
              right={<span className="text-xs px-2 py-1 bg-zinc-800 rounded-full flex items-center gap-1 text-zinc-500"><Eye size={10} className="text-purple-400"/>{progress}%</span>}
            />
          </div>
          <div className="max-w-2xl mx-auto px-5 pt-6">
            <p className="text-zinc-500 text-xs mb-6">by <button onClick={onAuthorClick} className="text-purple-300 hover:text-purple-200 transition underline underline-offset-2">{story.author}</button></p>
            <div className="mb-10">{chapter.content.split("\n\n").map((p,i)=><p key={i} className="text-zinc-200 text-base leading-8 mb-5">{p}</p>)}</div>
            <div className="flex items-center gap-3 mb-10 py-5 border-t border-b border-zinc-800">
              <button onClick={onLike} className={`flex items-center gap-2 flex-1 justify-center py-3 rounded-2xl text-sm font-medium transition ${liked?"bg-pink-950 text-pink-400":"bg-zinc-800 text-zinc-400"}`}>
                <Heart size={16} fill={liked?"currentColor":"none"}/>Like
              </button>
              <button onClick={()=>onWriteFanver(null)} className="flex items-center gap-2 flex-1 justify-center py-3 bg-purple-900/50 rounded-2xl text-sm font-medium text-purple-300 transition">
                <GitBranch size={16}/>Fanver
              </button>
            </div>
            {(prevChapter||nextChapter)&&(
              <div className="flex gap-3 mb-10">
                {prevChapter?(
                  <button onClick={()=>onChapterNav(prevChapter)} className="flex-1 flex items-center gap-2 p-3 bg-zinc-900 border border-zinc-800 rounded-2xl text-left active:bg-zinc-800 transition min-w-0">
                    <ChevronLeft size={16} className="text-zinc-600 flex-shrink-0"/>
                    <div className="min-w-0"><p className="text-zinc-600 text-[10px]">Previous</p><p className="text-zinc-300 text-xs font-medium truncate">Ch.{prevChapter.num}: {prevChapter.title}</p></div>
                  </button>
                ):<div className="flex-1"/>}
                {nextChapter?(
                  <button onClick={()=>onChapterNav(nextChapter)} className="flex-1 flex items-center gap-2 p-3 bg-zinc-900 border border-zinc-800 rounded-2xl text-right active:bg-zinc-800 transition min-w-0 justify-end">
                    <div className="min-w-0"><p className="text-zinc-600 text-[10px]">Next</p><p className="text-zinc-300 text-xs font-medium truncate">Ch.{nextChapter.num}: {nextChapter.title}</p></div>
                    <ChevronRight size={16} className="text-zinc-600 flex-shrink-0"/>
                  </button>
                ):<div className="flex-1"/>}
              </div>
            )}
            {rootFanvers.length>0&&(
              <div className="mb-10">
                <p className="text-xs text-zinc-500 uppercase tracking-wider mb-4 flex items-center gap-1.5"><GitBranch size={11} className="text-purple-400"/>Fanvers ({rootFanvers.length})</p>
                <div className="space-y-3">{rootFanvers.map(fv=><FanverCard key={fv.id} fv={fv} allFanvers={fanvers} onClick={()=>onViewFanver(fv)}/>)}</div>
              </div>
            )}
            <div>
              <p className="text-xs text-zinc-500 uppercase tracking-wider mb-4 flex items-center gap-1.5"><MessageCircle size={11}/>Comments ({comments.length})</p>
              <div className="flex gap-3 mb-6">
                <div className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center flex-shrink-0 mt-0.5"><User size={14} className="text-zinc-500"/></div>
                <div className="flex-1">
                  <textarea value={newComment} onChange={e=>setNewComment(e.target.value)} placeholder="Leave a comment…" className="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-3 text-sm text-white placeholder-zinc-500 resize-none focus:outline-none focus:border-purple-600 transition" rows={2}/>
                  <div className="flex justify-end mt-2">
                    <button onClick={submitComment} disabled={!newComment.trim()} className="px-5 py-2 bg-purple-600 disabled:opacity-40 rounded-xl text-sm font-medium">Post</button>
                  </div>
                </div>
              </div>
              <div className="space-y-4">
                {comments.map(cm=>(
                  <div key={cm.id} className="flex gap-3">
                    <div className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center flex-shrink-0"><User size={13} className="text-zinc-600"/></div>
                    <div>
                      <div className="flex items-baseline gap-2 mb-0.5">
                        <span className="text-sm font-medium text-purple-300">{cm.user}</span>
                        <span className="text-xs text-zinc-600">{cm.time}</span>
                      </div>
                      <p className="text-zinc-300 text-sm">{cm.text}</p>
                      <button onClick={()=>setCommentLikes(p=>({...p,[cm.id]:!p[cm.id]}))} className={`flex items-center gap-1 mt-1.5 text-xs ${commentLikes[cm.id]?"text-pink-400":"text-zinc-600"}`}>
                        <Heart size={11} fill={commentLikes[cm.id]?"currentColor":"none"}/>{cm.likes+(commentLikes[cm.id]?1:0)}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function FanverCard({ fv, allFanvers, onClick }) {
      const childCount=allFanvers.filter(f=>f.parentFanver===fv.id).length;
      return(
        <button onClick={onClick} className="w-full text-left p-4 bg-zinc-900 active:bg-zinc-800 border border-zinc-800 rounded-2xl transition">
          <div className="flex items-center gap-2 mb-2">
            <GitBranch size={13} className="text-purple-400"/>
            <span className="text-purple-300 text-xs font-medium">{fv.fan}</span>
            {fv.adopted&&<span className="flex items-center gap-1 px-1.5 py-0.5 bg-green-950 text-green-400 text-xs rounded-full"><Check size={10}/>Adopted</span>}
            <span className="text-zinc-600 text-xs ml-auto">{fv.timestamp}</span>
          </div>
          <p className="text-zinc-300 text-sm leading-relaxed line-clamp-3">{fv.content}</p>
          <div className="flex items-center gap-4 mt-3 text-xs text-zinc-500">
            <span className="flex items-center gap-1"><Heart size={11}/>{fmtNum(fv.likes)}</span>
            {childCount>0&&<span className="flex items-center gap-1 text-purple-500"><GitBranch size={11}/>{childCount} fork{childCount!==1?"s":""}</span>}
            <span className="ml-auto text-purple-400">Read →</span>
          </div>
        </button>
      );
    }

    function FanverView({ fanver, story, chapter, allFanvers, onBack, onFork, currentUser, isAuthor, onAdopt, onViewChild }) {
      const [adoptedLocal,setAdoptedLocal]=useState(fanver.adopted);
      const [liked,setLiked]=useState(false);
      const children=allFanvers.filter(f=>f.parentFanver===fanver.id);
      const parent=fanver.parentFanver?allFanvers.find(f=>f.id===fanver.parentFanver):null;
      return(
        <div className="pb-24 sm:pb-6">
          <div className="sticky top-0 z-30"><TopBar onBack={onBack} title={`Fanver by ${fanver.fan}`}/></div>
          <div className="max-w-2xl mx-auto px-5 pt-4">
            {parent&&<div className="mb-4 p-3 bg-zinc-900 rounded-2xl border border-zinc-800 text-xs text-zinc-500 flex items-center gap-2"><GitBranch size={12} className="text-purple-500"/>Forked from <span className="text-purple-300">{parent.fan}'s Fanver</span></div>}
            <p className="text-zinc-500 text-xs mb-5">Remix of "{story.title}" · Ch.{chapter.num}: {chapter.title}</p>
            {(adoptedLocal||fanver.adopted)&&<div className="mb-4 flex items-center gap-2 px-3 py-2 bg-green-950/40 border border-green-900 rounded-2xl text-xs text-green-400"><Check size={12}/>Adopted by the author</div>}

    const AUTHOR_COLORS=[["#7c3aed","#4c1d95"],["#db2777","#831843"],["#0891b2","#0c4a6e"],["#059669","#064e3b"],["#d97706","#78350f"],["#dc2626","#7f1d1d"]];

            <div className="flex items-center gap-4 mb-5 p-4 bg-zinc-900 rounded-2xl border border-zinc-800">
              <div className="w-16 h-16 rounded-full flex items-center justify-center flex-shrink-0" style={{background:`linear-gradient(135deg,${ca},${cb})`}}><User size={28} className="text-white/70"/></div>
              <div className="flex-1 min-w-0"><h1 className="font-bold text-xl truncate">{authorUsername}</h1><p className="text-zinc-500 text-sm">Author</p></div>
            </div>
            <div className="grid grid-cols-4 gap-2 mb-6">

                <div key={stat.label} className="p-3 bg-zinc-900 rounded-2xl border border-zinc-800 text-center">

    function AuthModal({ mode, setMode, onClose }) {
      const [username,setUsername]=useState("");
      const [email,setEmail]=useState("");
      const [password,setPassword]=useState("");
      const [loading,setLoading]=useState(false);
      const [error,setError]=useState("");

      const handleSubmit = async () => {
        setError(""); setLoading(true);
        try {
          if (mode === "signup") {
            if (!username.trim()||!email.trim()||!password.trim()) { setError("Please fill in all fields."); setLoading(false); return; }
            if (password.length < 6) { setError("Password must be at least 6 characters."); setLoading(false); return; }
            const { error: err } = await sb.auth.signUp({
              email: email.trim(), password,
              options: { data: { username: username.trim() } }
            });
            if (err) { setError(err.message); setLoading(false); return; }
            setError("✓ Account created! Check your email to confirm, then sign in.");
            setLoading(false); return;
          } else {
            if (!email.trim()||!password.trim()) { setError("Please fill in email and password."); setLoading(false); return; }
            const { error: err } = await sb.auth.signInWithPassword({ email: email.trim(), password });
            if (err) { setError(err.message); setLoading(false); return; }
            onClose();
          }
        } catch(e) { setError("Something went wrong. Try again."); }
        setLoading(false);
      };

      return(
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70" onClick={onClose}>
          <div className="bg-zinc-900 border border-zinc-700 rounded-t-3xl sm:rounded-2xl p-6 w-full sm:max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="sm:hidden w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-5"/>
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-bold text-lg">{mode==="login"?"Welcome back":"Join StoryFork"}</h2>
              <button onClick={onClose}><X size={18} className="text-zinc-500"/></button>
            </div>
            <div className="space-y-3 mb-5">
              {mode==="signup"&&<input type="text" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-purple-600 transition"/>}
              <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-purple-600 transition"/>
              <input type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-purple-600 transition"/>
              {mode==="signup"&&<div className="flex items-start gap-2 text-xs text-zinc-500 p-3 bg-zinc-800 rounded-xl"><Mail size={13} className="mt-0.5 text-purple-400 flex-shrink-0"/>You'll get email alerts for new Fanvers, comments, and adoptions.</div>}
              {error&&<p className={`text-xs px-1 ${error.startsWith("✓")?"text-green-400":"text-red-400"}`}>{error}</p>}
            </div>
            <button onClick={handleSubmit} disabled={loading} className="w-full py-3.5 bg-purple-600 active:bg-purple-500 disabled:opacity-50 rounded-2xl font-semibold text-sm transition mb-3">
              {loading?"Please wait…":mode==="login"?"Sign In":"Create Account"}
            </button>
            <p className="text-center text-xs text-zinc-500">{mode==="login"?"New here?":"Have an account?"}{" "}<button onClick={()=>{setMode(mode==="login"?"signup":"login");setError("");}} className="text-purple-400">{mode==="login"?"Join StoryFork":"Sign in"}</button></p>
          </div>
        </div>
      );
    }

    function UploadModal({ onClose, currentUser, onPublish }) {
      const [title,setTitle]=useState("");const [genre,setGenre]=useState("Fantasy");const [tags,setTags]=useState("");
      const [desc,setDesc]=useState("");const [chTitle,setChTitle]=useState("");const [chContent,setChContent]=useState("");const [step,setStep]=useState(1);
      const publish=()=>onPublish({id:`s_${Date.now()}`,title,author:currentUser.username,authorId:currentUser.id,grad:Math.floor(Math.random()*6),genre,tags:tags.split(",").map(t=>t.trim()).filter(Boolean),likes:0,chapterCount:1,trending:false,isNew:true,description:desc,characters:[],chapters:[{id:`c_${Date.now()}`,num:1,title:chTitle,content:chContent}]});
      return(
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70" onClick={onClose}>
          <div className="bg-zinc-900 border border-zinc-700 rounded-t-3xl sm:rounded-2xl p-5 w-full sm:max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
            <div className="sm:hidden w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-4"/>
            <div className="flex items-center justify-between mb-5"><h2 className="font-bold text-base">{step===1?"Story Details":"First Chapter"}</h2><button onClick={onClose}><X size={18} className="text-zinc-500"/></button></div>
            {step===1
              ?<div className="space-y-3"><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Story title" className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-purple-600 transition"/><select value={genre} onChange={e=>setGenre(e.target.value)} className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-purple-600 transition">{GENRES.slice(1).map(g=><option key={g}>{g}</option>)}</select><input value={tags} onChange={e=>setTags(e.target.value)} placeholder="Tags (comma separated)" className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-purple-600 transition"/><textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Short description…" rows={3} className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-500 resize-none focus:outline-none focus:border-purple-600 transition"/><button onClick={()=>setStep(2)} disabled={!title.trim()} className="w-full py-3.5 bg-purple-600 active:bg-purple-500 disabled:opacity-40 rounded-2xl font-semibold text-sm transition">Next →</button></div>
              :<div className="space-y-3"><input value={chTitle} onChange={e=>setChTitle(e.target.value)} placeholder="Chapter title" className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-purple-600 transition"/><textarea value={chContent} onChange={e=>setChContent(e.target.value)} placeholder="Write your chapter…" rows={10} className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-500 resize-none focus:outline-none focus:border-purple-600 transition"/><div className="flex gap-2"><button onClick={()=>setStep(1)} className="px-5 py-3 bg-zinc-800 rounded-xl text-sm">← Back</button><button onClick={publish} disabled={!chTitle.trim()||chContent.length<50} className="flex-1 py-3 bg-purple-600 active:bg-purple-500 disabled:opacity-40 rounded-xl font-semibold text-sm flex items-center justify-center gap-2"><Upload size={15}/>Publish</button></div></div>
            }
          </div>
        </div>
      );
    }

    // ─── ROOT APP ─────────────────────────────────────────────────────────────

    function App() {
      const [view,setView]=useState("home");
      const [selectedStory,setSelectedStory]=useState(null);
      const [selectedChapter,setSelectedChapter]=useState(null);
      const [selectedFanver,setSelectedFanver]=useState(null);
      const [selectedAuthor,setSelectedAuthor]=useState(null);
      const [parentFanverForWrite,setParentFanverForWrite]=useState(null);
      const [authOpen,setAuthOpen]=useState(false);
      const [authMode,setAuthMode]=useState("login");
      const [currentUser,setCurrentUser]=useState(null);
      const [activeTab,setActiveTab]=useState("trending");
      const [activeGenre,setActiveGenre]=useState("All");
      const [fanverText,setFanverText]=useState("");
      const [comments,setComments]=useState(INIT_COMMENTS);
      const [newComment,setNewComment]=useState("");
      const [fanvers,setFanvers]=useState(INIT_FANVERS);
      const [stories,setStories]=useState(STORIES);
      const [cosplays,setCosplays]=useState(INIT_COSPLAYS);
      const [uploadOpen,setUploadOpen]=useState(false);
      const [cosplayUploadOpen,setCosplayUploadOpen]=useState(false);
      const [notifOpen,setNotifOpen]=useState(false);
      const [likedStories,setLikedStories]=useState(new Set());
      const [likedChapters,setLikedChapters]=useState(new Set());
      const [cosplayFilterChar,setCosplayFilterChar]=useState(null);
      const [cosplayFilterStory,setCosplayFilterStory]=useState(null);
      const [notifications,setNotifications]=useState([
        {id:"n1",text:"xianxia_fan99 created a Fanver of 'The Fall'",read:false,time:"30m ago"},
        {id:"n2",text:"starfall_writes' Fanver was adopted — fan credited!",read:true,time:"1d ago"},
        {id:"n3",text:"📧 Email: new Fanver on Chapter 1",read:true,time:"2d ago"},
      ]);

      // ── Supabase auth: restore session + listen for changes ──
      useEffect(()=>{
        sb.auth.getSession().then(({data:{session}})=>{
          if(session){const u=session.user;setCurrentUser({id:u.id,username:u.user_metadata?.username||u.email.split("@")[0],email:u.email});}
        });
        const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
          if(session){const u=session.user;setCurrentUser({id:u.id,username:u.user_metadata?.username||u.email.split("@")[0],email:u.email});}
          else setCurrentUser(null);
        });
        return ()=>subscription.unsubscribe();
      },[]);

      const handleLogout=async()=>{await sb.auth.signOut();setCurrentUser(null);nav("home");};

      const nav=(v,story=null,chapter=null,fanver=null)=>{setView(v);if(story!==null)setSelectedStory(story);if(chapter!==null)setSelectedChapter(chapter);if(fanver!==null)setSelectedFanver(fanver);window.scrollTo(0,0);};
      const navToAuthor=(authorId,authorUsername)=>{setSelectedAuthor({id:authorId,username:authorUsername});setView("author");window.scrollTo(0,0);};
      const handleBottomNav=id=>{if(id==="auth"){setAuthMode("login");setAuthOpen(true);return;}nav(id);};
      const handleWriteFanver=(pFv=null)=>{if(!currentUser){setAuthMode("signup");setAuthOpen(true);return;}setParentFanverForWrite(pFv);nav("write-fanver",selectedStory,selectedChapter);};
      const handleAdopt=(fvId)=>{
        const chapterId=Object.keys(fanvers).find(cid=>fanvers[cid].some(fv=>fv.id===fvId));
        if(!chapterId)return;
        const fv=fanvers[chapterId].find(f=>f.id===fvId);
        setFanvers(prev=>({...prev,[chapterId]:prev[chapterId].map(f=>f.id===fvId?{...f,adopted:true}:f)}));
        setNotifications(prev=>[{id:`n_${Date.now()}`,text:`You adopted ${fv?.fan||"a fan"}'s Fanver — they've been credited!`,read:false,time:"just now"},...prev]);
      };

      const filteredStories=(()=>{const base=stories.filter(s=>activeGenre==="All"||s.genre===activeGenre);const tabbed=base.filter(s=>activeTab==="all"||(activeTab==="trending"&&s.trending)||(activeTab==="new"&&s.isNew));return tabbed.length>0?tabbed:base;})();
      const unread=notifications.filter(n=>!n.read).length;
      const showMobileTopBar=["home","cosplay","search"].includes(view);

      return(
        <div className="min-h-screen bg-zinc-950 text-white" style={{fontFamily:"system-ui,sans-serif"}}>
          <nav className="hidden sm:flex fixed top-0 left-0 right-0 z-50 bg-zinc-950/95 border-b border-zinc-800 backdrop-blur items-center gap-3 px-4 py-3">
            <button onClick={()=>nav("home")} className="flex items-center gap-2 font-bold text-lg tracking-tight flex-shrink-0"><GitBranch className="text-purple-400" size={20}/>Story<span className="text-purple-400">Fork</span></button>
            <div className="relative flex-1 max-w-sm"><Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none"/><input type="text" placeholder="Search…" onFocus={()=>nav("search")} className="w-full bg-zinc-800 border border-zinc-700 rounded-xl pl-9 pr-4 py-2 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-purple-600 transition"/></div>
            <button onClick={()=>nav("cosplay")} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition ${view==="cosplay"?"bg-pink-950/60 text-pink-300 border border-pink-900":"text-zinc-400 hover:text-white hover:bg-zinc-800"}`}><Camera size={15}/>Cosplay</button>
            {currentUser?(
              <div className="flex items-center gap-2">
                <div className="relative">
                  <button onClick={()=>setNotifOpen(o=>!o)} className="relative p-2 rounded-full hover:bg-zinc-800 transition"><Bell size={18}/>{unread>0&&<span className="absolute top-1 right-1 w-2 h-2 bg-purple-500 rounded-full"/>}</button>
                  {notifOpen&&(<><div className="fixed inset-0 z-40" onClick={()=>setNotifOpen(false)}/><div className="absolute right-0 top-11 w-80 bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl z-50 overflow-hidden"><div className="p-3 border-b border-zinc-800 text-sm font-semibold flex items-center justify-between">Notifications<button onClick={()=>setNotifications(p=>p.map(n=>({...n,read:true})))} className="text-xs text-purple-400">Mark all read</button></div>{notifications.map(n=><div key={n.id} onClick={()=>{setNotifications(p=>p.map(x=>x.id===n.id?{...x,read:true}:x));setNotifOpen(false);}} className={`p-3 text-sm border-b border-zinc-800 hover:bg-zinc-800 cursor-pointer ${!n.read?"bg-purple-950/30":""}`}><p className="text-zinc-200">{n.text}</p><p className="text-zinc-500 text-xs mt-1">{n.time}</p></div>)}</div></>)}
                </div>
                <button onClick={()=>nav("dashboard")} className="flex items-center gap-1.5 px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm transition"><User size={13}/>{currentUser.username}</button>
              </div>
            ):(
              <div className="flex gap-2">
                <button onClick={()=>{setAuthMode("login");setAuthOpen(true);}} className="px-3 py-1.5 text-sm text-zinc-400 hover:text-white transition">Sign in</button>
                <button onClick={()=>{setAuthMode("signup");setAuthOpen(true);}} className="px-3 py-1.5 bg-purple-600 hover:bg-purple-500 rounded-lg text-sm font-medium transition">Join</button>
              </div>
            )}
          </nav>

          {showMobileTopBar&&(
            <div className="sm:hidden fixed top-0 left-0 right-0 z-40 bg-zinc-950/95 border-b border-zinc-800 backdrop-blur flex items-center justify-between px-4 py-3">
              <button onClick={()=>nav("home")} className="flex items-center gap-1.5 font-bold text-base"><GitBranch className="text-purple-400" size={18}/>Story<span className="text-purple-400">Fork</span></button>
              <div className="flex items-center gap-2">
                {currentUser&&(
                  <div className="relative">
                    <button onClick={()=>setNotifOpen(o=>!o)} className="relative p-1.5"><Bell size={20}/>{unread>0&&<span className="absolute top-0.5 right-0.5 w-2 h-2 bg-purple-500 rounded-full"/>}</button>
                    {notifOpen&&(<><div className="fixed inset-0 z-40" onClick={()=>setNotifOpen(false)}/><div className="absolute right-0 top-10 w-72 bg-zinc-900 border border-zinc-700 rounded-2xl shadow-2xl z-50 overflow-hidden"><div className="p-3 border-b border-zinc-800 text-sm font-semibold flex items-center justify-between">Notifications<button onClick={()=>setNotifications(p=>p.map(n=>({...n,read:true})))} className="text-xs text-purple-400">Mark all read</button></div>{notifications.map(n=><div key={n.id} onClick={()=>{setNotifications(p=>p.map(x=>x.id===n.id?{...x,read:true}:x));setNotifOpen(false);}} className={`p-3 text-sm border-b border-zinc-800 ${!n.read?"bg-purple-950/30":""}`}><p className="text-zinc-200">{n.text}</p><p className="text-zinc-500 text-xs mt-1">{n.time}</p></div>)}</div></>)}
                  </div>
                )}
                {!currentUser&&<button onClick={()=>{setAuthMode("signup");setAuthOpen(true);}} className="px-3 py-1.5 bg-purple-600 rounded-lg text-xs font-medium">Join</button>}
              </div>
            </div>
          )}

          <div className={`${showMobileTopBar?"pt-14":"pt-0"} sm:pt-16`}>
            {view==="home"&&<HomePage stories={filteredStories} activeTab={activeTab} setActiveTab={setActiveTab} activeGenre={activeGenre} setActiveGenre={setActiveGenre} onStoryClick={s=>nav("story",s)} liked={likedStories} onLike={id=>setLikedStories(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;})} onUpload={()=>currentUser?setUploadOpen(true):(setAuthMode("signup"),setAuthOpen(true))} currentUser={currentUser}/>}
            {view==="search"&&<DiscoverPage stories={stories} onStoryClick={s=>nav("story",s)}/>}
            {view==="cosplay"&&<CosplayPage cosplays={cosplays} stories={stories} onUpload={()=>setCosplayUploadOpen(true)} currentUser={currentUser} onAuthRequired={()=>{setAuthMode("signup");setAuthOpen(true);}} filterCharacter={cosplayFilterChar} filterStory={cosplayFilterStory}/>}
            {view==="story"&&selectedStory&&<StoryPage story={selectedStory} onBack={()=>nav("home")} onChapterClick={ch=>nav("chapter",selectedStory,ch)} fanvers={fanvers} cosplays={cosplays} onCosplayNav={()=>{setCosplayFilterStory(selectedStory.id);setCosplayFilterChar(null);nav("cosplay");}} onCharacterCosplay={(char,story)=>{setCosplayFilterStory(story.id);setCosplayFilterChar(char.id);nav("cosplay");}} onAuthorClick={()=>navToAuthor(selectedStory.authorId,selectedStory.author)}/>}
            {view==="chapter"&&selectedChapter&&selectedStory&&<ChapterReader story={selectedStory} chapter={selectedChapter} onBack={()=>nav("story",selectedStory)} fanvers={fanvers[selectedChapter.id]||[]} comments={comments[selectedChapter.id]||[]} setComments={setComments} newComment={newComment} setNewComment={setNewComment} currentUser={currentUser} liked={likedChapters.has(selectedChapter.id)} onLike={()=>setLikedChapters(prev=>{const n=new Set(prev);n.has(selectedChapter.id)?n.delete(selectedChapter.id):n.add(selectedChapter.id);return n;})} onWriteFanver={handleWriteFanver} onViewFanver={fv=>nav("fanver",selectedStory,selectedChapter,fv)} onChapterNav={ch=>nav("chapter",selectedStory,ch)} onAuthorClick={()=>navToAuthor(selectedStory.authorId,selectedStory.author)}/>}
            {view==="write-fanver"&&selectedChapter&&selectedStory&&<FanverWriter story={selectedStory} chapter={selectedChapter} parentFanver={parentFanverForWrite} fanverText={fanverText} setFanverText={setFanverText} onBack={()=>nav("chapter",selectedStory,selectedChapter)} onSubmit={()=>{const nFv={id:`fv_${Date.now()}`,chapterId:selectedChapter.id,storyId:selectedStory.id,fan:currentUser?.username||"anon_fan",content:fanverText,likes:0,adopted:false,parentFanver:parentFanverForWrite?.id||null,childFanvers:[],timestamp:"just now"};setFanvers(prev=>({...prev,[selectedChapter.id]:[...(prev[selectedChapter.id]||[]),nFv]}));setFanverText("");nav("chapter",selectedStory,selectedChapter);}}/>}
            {view==="fanver"&&selectedFanver&&selectedStory&&selectedChapter&&<FanverView fanver={selectedFanver} story={selectedStory} chapter={selectedChapter} allFanvers={fanvers[selectedChapter.id]||[]} onBack={()=>nav("chapter",selectedStory,selectedChapter)} onFork={()=>{if(!currentUser){setAuthMode("signup");setAuthOpen(true);return;}setParentFanverForWrite(selectedFanver);nav("write-fanver",selectedStory,selectedChapter);}} currentUser={currentUser} isAuthor={currentUser?.id===selectedStory.authorId} onAdopt={handleAdopt} onViewChild={child=>{setSelectedFanver(child);window.scrollTo(0,0);}}/>}
            {view==="author"&&selectedAuthor&&<AuthorPage authorId={selectedAuthor.id} authorUsername={selectedAuthor.username} stories={stories} cosplays={cosplays} onBack={()=>setView("story")} onStoryClick={s=>nav("story",s)}/>}
            {view==="dashboard"&&currentUser&&<Dashboard currentUser={currentUser} stories={stories.filter(s=>s.authorId===currentUser.id)} notifications={notifications} onBack={()=>nav("home")} fanvers={fanvers} onAdopt={handleAdopt} onLogout={handleLogout}/>}
          </div>

          <BottomNav view={view} onNav={handleBottomNav} currentUser={currentUser} unread={unread}/>

          {authOpen&&<AuthModal mode={authMode} setMode={setAuthMode} onClose={()=>setAuthOpen(false)}/>}
          {uploadOpen&&<UploadModal onClose={()=>setUploadOpen(false)} currentUser={currentUser} onPublish={story=>{setStories(prev=>[story,...prev]);setUploadOpen(false);}}/>}
          {cosplayUploadOpen&&<CosplayUploadModal onClose={()=>setCosplayUploadOpen(false)} currentUser={currentUser} stories={stories} onPublish={cp=>{setCosplays(prev=>[cp,...prev]);setCosplayUploadOpen(false);}}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
